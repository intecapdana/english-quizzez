<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Verbs Flashcards - INTECAP</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(255, 206, 28);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { 
            color: #2c3e50; 
            margin-bottom: 15px;
            font-size: 1.8rem;
            text-align: center;
        }
        p {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }
        /* Contenedor de la tarjeta */
        .card-container {
            perspective: 1000px;
            height: 220px;
            cursor: pointer;
        }
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 15px;
        }
        /* Clase para rotar */
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        /* Caras de la tarjeta */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: 15px;
        }
        .card-front {
            background-color: #ffffff;
            color: #2c3e50;
            border: 3px solid #3498db;
        }
        .card-back {
            background-color: #3498db;
            color: white;
            transform: rotateY(180deg);
        }
        .verb-text { 
            font-size: 1.8rem; 
            font-weight: bold; 
            margin-bottom: 8px; 
        }
        .tense-label { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            opacity: 0.8; 
        }
        
        .speak-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            margin-top: 12px;
            cursor: pointer;
            font-size: 0.75rem;
            touch-action: manipulation;
        }
        .speak-btn:hover { background: #1a252f; }
        .speak-btn:active { transform: scale(0.95); }

        /* Responsive design para tablets */
        @media (min-width: 600px) {
            body { padding: 30px; }
            h1 { font-size: 2rem; margin-bottom: 20px; }
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }
            .card-container { height: 240px; }
            .verb-text { font-size: 2rem; }
            .speak-btn { padding: 8px 15px; font-size: 0.8rem; }
        }

        /* Responsive design para desktop */
        @media (min-width: 900px) {
            body { padding: 40px; }
            h1 { font-size: 2.2rem; margin-bottom: 30px; }
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
            .card-container { height: 250px; }
            .card-face { padding: 20px; }
            .verb-text { font-size: 2rem; margin-bottom: 10px; }
            .tense-label { font-size: 0.9rem; }
            .speak-btn { padding: 8px 15px; font-size: 0.8rem; margin-top: 15px; }
        }
    </style>
</head>
<body>

    <h1>Regular Verbs ending in "-d"</h1>
    <p>Click on the card to see the Past Tense. Click the button to hear it!</p>

    <div class="grid">
        <div class="card-container">
            <div class="card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-face card-front">
                    <span class="tense-label">Present</span>
                    <span class="verb-text">Call</span>
                    <button class="speak-btn" onclick="event.stopPropagation(); speak('Call')">🔊 Pronounce</button>
                </div>
                <div class="card-face card-back">
                    <span class="tense-label">Past Simple</span>
                    <span class="verb-text">Called</span>
                    <span class="tense-label">Llamar</span>
                    <button class="speak-btn" onclick="event.stopPropagation(); speak('Called')">🔊 Pronounce</button>
                </div>
            </div>
        </div>

        <div class="card-container">
            <div class="card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-face card-front">
                    <span class="tense-label">Present</span>
                    <span class="verb-text">Study</span>
                    <button class="speak-btn" onclick="event.stopPropagation(); speak('Study')">🔊 Pronounce</button>
                </div>
                <div class="card-face card-back">
                    <span class="tense-label">Past Simple</span>
                    <span class="verb-text">Studied</span>
                    <span class="tense-label">Estudiar</span>
                    <button class="speak-btn" onclick="event.stopPropagation(); speak('Studied')">🔊 Pronounce</button>
                </div>
            </div>
        </div>

        <div class="card-container">
            <div class="card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-face card-front">
                    <span class="tense-label">Present</span>
                    <span class="verb-text">Approve</span>
                    <button class="speak-btn" onclick="event.stopPropagation(); speak('Approve')">🔊 Pronounce</button>
                </div>
                <div class="card-face card-back">
                    <span class="tense-label">Past Simple</span>
                    <span class="verb-text">Approved</span>
                    <span class="tense-label">Aprobar</span>
                    <button class="speak-btn" onclick="event.stopPropagation(); speak('Approved')">🔊 Pronounce</button>
                </div>
            </div>
        </div>

        <div class="card-container">
            <div class="card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-face card-front">
                    <span class="tense-label">Present</span>
                    <span class="verb-text">Play</span>
                    <button class="speak-btn" onclick="event.stopPropagation(); speak('Play')">🔊 Pronounce</button>
                </div>
                <div class="card-face card-back">
                    <span class="tense-label">Past Simple</span>
                    <span class="verb-text">Played</span>
                    <span class="tense-label">Jugar / Tocar</span>
                    <button class="speak-btn" onclick="event.stopPropagation(); speak('Played')">🔊 Pronounce</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>>
